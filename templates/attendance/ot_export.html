{% extends "base.html" %}
{% block content %}
<div class="container py-3">
  <h3 class="mb-3"><i class="bi bi-file-earmark-excel me-2"></i>Export Approved Overtime</h3>

  <div class="card">
    <div class="card-body">
      <form method="post" action="{{ url_for('attendance.export') }}">
        {{ csrf_token() }}

        <div class="row g-3">
          <div class="col-12 col-md-4">
            <label class="form-label">Start date</label>
            <input type="date" class="form-control" name="start_date" value="{{ start_default }}" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">End date</label>
            <input type="date" class="form-control" name="end_date" value="{{ end_default }}" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Room</label>
            <select class="form-select" name="room_number">
              {% for val, label in room_choices %}
                <option value="{{ val }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Name contains (optional)</label>
            <input type="text" class="form-control" name="name_like" placeholder="e.g. John">
          </div>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-download me-1"></i> Download XLSX
          </button>
          <a href="{{ url_for('attendance.dashboard') }}" class="btn btn-outline-secondary ms-2">Back</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
